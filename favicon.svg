<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <!-- Definitions for Gradients and Glows -->
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1a1a2e" />
            <stop offset="100%" stop-color="#0f0f1a" />
        </linearGradient>
        
        <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f0ff" />
            <stop offset="100%" stop-color="#0055ff" />
        </linearGradient>

        <linearGradient id="neonMagenta" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff0055" />
            <stop offset="100%" stop-color="#aa00ff" />
        </linearGradient>

        <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <filter id="glowMagenta" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Background Base -->
    <rect width="512" height="512" rx="115" fill="url(#bgGrad)" />

    <!-- Outer Border (Neon Cyan) -->
    <rect x="30" y="30" width="452" height="452" rx="90" fill="none" stroke="url(#neonCyan)" stroke-width="24" filter="url(#glowCyan)" />

    <!-- Internal Grid Lines (Neon Cyan) -->
    <line x1="180" y1="50" x2="180" y2="462" stroke="url(#neonCyan)" stroke-width="12" filter="url(#glowCyan)" opacity="0.8" />
    <line x1="332" y1="50" x2="332" y2="462" stroke="url(#neonCyan)" stroke-width="12" filter="url(#glowCyan)" opacity="0.8" />
    <line x1="50" y1="180" x2="462" y2="180" stroke="url(#neonCyan)" stroke-width="12" filter="url(#glowCyan)" opacity="0.8" />
    <line x1="50" y1="332" x2="462" y2="332" stroke="url(#neonCyan)" stroke-width="12" filter="url(#glowCyan)" opacity="0.8" />

    <!-- Center Cell Highlight (Neon Magenta) -->
    <rect x="186" y="186" width="140" height="140" rx="20" fill="url(#neonMagenta)" filter="url(#glowMagenta)" opacity="0.9" />

    <!-- Number inside the center cell -->
    <text x="256" y="296" font-family="Outfit, sans-serif, Arial" font-size="100" font-weight="900" fill="#ffffff" text-anchor="middle">9</text>
    
    <!-- Some subtle numbers around -->
    <text x="115" y="135" font-family="Outfit, sans-serif, Arial" font-size="60" font-weight="700" fill="#00f0ff" text-anchor="middle" opacity="0.6">1</text>
    <text x="397" y="135" font-family="Outfit, sans-serif, Arial" font-size="60" font-weight="700" fill="#00f0ff" text-anchor="middle" opacity="0.6">4</text>
    <text x="115" y="417" font-family="Outfit, sans-serif, Arial" font-size="60" font-weight="700" fill="#00f0ff" text-anchor="middle" opacity="0.6">7</text>
    <text x="397" y="417" font-family="Outfit, sans-serif, Arial" font-size="60" font-weight="700" fill="#00f0ff" text-anchor="middle" opacity="0.6">3</text>
</svg>
