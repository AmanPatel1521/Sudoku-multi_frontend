<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>
        <filter id="neon-glow-grid" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feComponentTransfer in="blur" result="glow">
                <feFuncA type="linear" slope="1.5"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode in="glow" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="neon-glow-text" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feComponentTransfer in="blur" result="glow">
                <feFuncA type="linear" slope="2"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode in="glow" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <!-- Dark Slate Background with rounded corners -->
    <rect width="120" height="120" rx="24" ry="24" fill="url(#bg)" />
    
    <!-- Neon Blue Grid -->
    <g stroke="#38bdf8" fill="none" filter="url(#neon-glow-grid)">
        <rect x="20" y="20" width="80" height="80" rx="8" stroke-width="3" />
        <line x1="46.66" y1="20" x2="46.66" y2="100" stroke-width="1.5" opacity="0.7" />
        <line x1="73.33" y1="20" x2="73.33" y2="100" stroke-width="1.5" opacity="0.7" />
        <line x1="20" y1="46.66" x2="100" y2="46.66" stroke-width="1.5" opacity="0.7" />
        <line x1="20" y1="73.33" x2="100" y2="73.33" stroke-width="1.5" opacity="0.7" />
    </g>
    
    <!-- Center Purple 9 -->
    <text x="60" y="76" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="52" fill="#a855f7" filter="url(#neon-glow-text)" text-anchor="middle">9</text>
</svg>
