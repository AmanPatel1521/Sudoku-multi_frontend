config:
  target: "https://multiplayersudoku.in"
  phases:
    - duration: 60
      arrivalCount: 50
      name: "sustained_load_test"
  engines:
    playwright:
      launchOptions:
        args: ["--no-sandbox", "--disable-setuid-sandbox"]
  processor: "./playwright-processor.js"

scenarios:
  - name: "User Journey: Lobby to Active Solo Match"
    engine: "playwright"
    testFunction: "playSudokuTest"
